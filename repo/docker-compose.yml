services:
  init-secrets:
    build: ./scripts/init-secrets
    volumes:
      - secrets:/run/secrets

  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: campusrec
      POSTGRES_USER: campusrec
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
    entrypoint:
      - sh
      - -c
      - |
        chown postgres:postgres /wal_archive
        # Allow replication connections for pg_basebackup (PITR support)
        if [ -f /var/lib/postgresql/data/pg_hba.conf ]; then
          grep -q "replication.*campusrec" /var/lib/postgresql/data/pg_hba.conf || echo "host replication campusrec all md5" >> /var/lib/postgresql/data/pg_hba.conf
        fi
        printf '#!/bin/sh\necho "host replication campusrec all md5" >> "$PGDATA/pg_hba.conf"\n' > /docker-entrypoint-initdb.d/allow-replication.sh
        chmod +x /docker-entrypoint-initdb.d/allow-replication.sh
        exec docker-entrypoint.sh postgres \
          -c wal_level=replica \
          -c archive_mode=on \
          -c "archive_command=test ! -f /wal_archive/%f && cp %p /wal_archive/%f && chmod 644 /wal_archive/%f" \
          -c max_wal_senders=3
    depends_on:
      init-secrets:
        condition: service_completed_successfully
    volumes:
      - pgdata:/var/lib/postgresql/data
      - secrets:/run/secrets:ro
      - wal_archive:/wal_archive
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U campusrec -d campusrec"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8080:8080"
    environment:
      SECRETS_PATH: /run/secrets
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: campusrec
      DB_USER: campusrec
      SERVER_PORT: "8080"
      GIN_MODE: release
      CORS_ALLOWED_ORIGINS: "http://localhost:3000"
      BACKUP_PATH: /backups
      LOG_LEVEL: info
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - backups:/backups
      - secrets:/run/secrets
      - wal_archive:/wal_archive:ro
    command: ["server"]

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      SECRETS_PATH: /run/secrets
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: campusrec
      DB_USER: campusrec
      BACKUP_PATH: /backups
      LOG_LEVEL: info
    depends_on:
      db:
        condition: service_healthy
      backend:
        condition: service_started
    volumes:
      - backups:/backups
      - secrets:/run/secrets:ro
      - wal_archive:/wal_archive:ro
    command: ["worker"]

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_started

  test-runner:
    build:
      context: .
      dockerfile: backend/Dockerfile.test
    environment:
      SECRETS_PATH: /run/secrets
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: campusrec
      DB_USER: campusrec
      API_BASE_URL: http://backend:8080
    depends_on:
      backend:
        condition: service_started
      db:
        condition: service_healthy
    volumes:
      - secrets:/run/secrets:ro
    profiles:
      - test

volumes:
  pgdata:
  backups:
  secrets:
  wal_archive:
