{{define "content"}}
<div>
    <div class="flex justify-between items-center mb-6">
        <h1 class="text-2xl font-bold text-gray-900">Posts</h1>
        <button onclick="showPostForm()" class="px-4 py-2 bg-indigo-600 text-white rounded-md hover:bg-indigo-700 text-sm">New Post</button>
    </div>
    <div id="post-form-container" class="hidden mb-6 bg-white rounded-lg shadow p-6">
        <h3 class="text-lg font-medium mb-4">Create Post</h3>
        <form id="post-form" class="space-y-4">
            <div><label class="block text-sm font-medium text-gray-700">Title</label><input id="post-title" class="mt-1 block w-full px-3 py-2 border rounded-md text-sm" required></div>
            <div><label class="block text-sm font-medium text-gray-700">Content</label><textarea id="post-body" rows="4" class="mt-1 block w-full px-3 py-2 border rounded-md text-sm" required></textarea></div>
            <div class="flex justify-end space-x-2">
                <button type="button" onclick="document.getElementById('post-form-container').classList.add('hidden')" class="px-4 py-2 border rounded-md text-sm">Cancel</button>
                <button type="submit" id="post-submit-btn" class="px-4 py-2 bg-indigo-600 text-white rounded-md hover:bg-indigo-700 text-sm">Post</button>
            </div>
        </form>
    </div>
    <div id="posts-list"><div class="skeleton h-24 rounded-lg mb-3"></div></div>
    <div id="posts-pagination"></div>
</div>
{{end}}

{{define "scripts"}}
<script>
function showPostForm() { document.getElementById('post-form-container').classList.remove('hidden'); }

document.getElementById('post-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('post-submit-btn');
    const res = await apiSubmit('/api/posts', { title: document.getElementById('post-title').value, body: document.getElementById('post-body').value }, btn, 'Post');
    if (res) { document.getElementById('post-form-container').classList.add('hidden'); document.getElementById('post-form').reset(); loadPosts(1); }
});

async function loadPosts(page) {
    const res = await api(`/api/posts?page=${page || 1}&page_size=20`);
    if (!res) return;
    const items = res.data?.items || [];
    const el = document.getElementById('posts-list');
    if (!items.length) { el.innerHTML = '<p class="text-gray-500 py-4">No posts yet.</p>'; return; }

    el.innerHTML = items.map(p => `
        <div class="bg-white rounded-lg shadow p-4 mb-3">
            <div class="flex justify-between items-start">
                <div>
                    <h3 class="font-medium">${p.title}</h3>
                    <p class="text-sm text-gray-600 mt-1">${p.body?.substring(0, 200) || ''}${p.body?.length > 200 ? '...' : ''}</p>
                    <p class="text-xs text-gray-400 mt-2">By ${p.display_name || p.username || 'User'} - ${formatDate(p.created_at)}</p>
                </div>
                <div class="flex items-center space-x-2">
                    ${statusBadge(p.status || 'visible')}
                    <button onclick="reportPost('${p.id}')" class="text-sm text-red-500 hover:text-red-700" title="Report">Report</button>
                </div>
            </div>
        </div>
    `).join('');
    document.getElementById('posts-pagination').innerHTML = renderPagination(res.data, 'loadPosts');
}

async function reportPost(id) {
    const reason = prompt('Reason for reporting:');
    if (!reason) return;
    const res = await api(`/api/posts/${id}/report`, { method: 'POST', body: JSON.stringify({ reason }) });
    if (res) showAlert('success', 'Post reported');
}

loadPosts(1);
</script>
{{end}}
