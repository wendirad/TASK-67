{{define "content"}}
<div>
    <h1 class="text-2xl font-bold text-gray-900 mb-6">KPI Dashboard</h1>
    <div class="flex flex-wrap gap-3 mb-6">
        <input type="date" id="kpi-from" class="px-3 py-2 border rounded-md text-sm">
        <input type="date" id="kpi-to" class="px-3 py-2 border rounded-md text-sm">
        <select id="kpi-granularity" class="px-3 py-2 border rounded-md text-sm">
            <option value="daily">Daily</option>
            <option value="weekly">Weekly</option>
            <option value="monthly" selected>Monthly</option>
        </select>
        <button onclick="loadKPI()" class="px-4 py-2 bg-indigo-600 text-white rounded-md hover:bg-indigo-700 text-sm">Refresh</button>
    </div>
    <div id="kpi-cards" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mb-6"></div>
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
        <div class="bg-white rounded-lg shadow p-5"><h3 class="text-lg font-medium mb-3">Fill Rate by Facility</h3><canvas id="fillRateChart"></canvas></div>
        <div class="bg-white rounded-lg shadow p-5"><h3 class="text-lg font-medium mb-3">Revenue Over Time</h3><canvas id="revenueChart"></canvas></div>
        <div class="bg-white rounded-lg shadow p-5"><h3 class="text-lg font-medium mb-3">Member Growth</h3><canvas id="memberChart"></canvas></div>
        <div class="bg-white rounded-lg shadow p-5"><h3 class="text-lg font-medium mb-3">Ticket Metrics</h3><canvas id="ticketChart"></canvas></div>
    </div>
</div>
{{end}}

{{define "scripts"}}
<script>
let charts = {};

function initDate() {
    const to = new Date();
    const from = new Date(); from.setDate(from.getDate() - 30);
    document.getElementById('kpi-from').value = from.toISOString().split('T')[0];
    document.getElementById('kpi-to').value = to.toISOString().split('T')[0];
}

async function loadKPI() {
    const from = document.getElementById('kpi-from').value;
    const to = document.getElementById('kpi-to').value;
    const gran = document.getElementById('kpi-granularity').value;
    const params = `from_date=${from}&to_date=${to}&granularity=${gran}`;

    const [overview, fillRate, revenue, members, tickets] = await Promise.all([
        api(`/api/kpi/overview?${params}`),
        api(`/api/kpi/fill-rate?${params}`),
        api(`/api/kpi/revenue?${params}`),
        api(`/api/kpi/members?${params}`),
        api(`/api/kpi/tickets?${params}`)
    ]);

    // Cards
    const o = overview?.data || {};
    document.getElementById('kpi-cards').innerHTML = `
        ${statCard('Total Members', o.total_members || 0)}
        ${statCard('Active Sessions', o.active_sessions || 0)}
        ${statCard('Open Tickets', o.open_tickets || 0, 'text-yellow-600')}
        ${statCard('Revenue (30d)', formatCents(o.revenue_30d || 0), 'text-green-600')}
    `;

    // Fill rate chart
    const fr = fillRate?.data || [];
    destroyChart('fillRateChart');
    if (fr.length) {
        charts.fillRateChart = new Chart(document.getElementById('fillRateChart'), {
            type: 'bar',
            data: {
                labels: fr.map(f => f.facility_name || 'Unknown'),
                datasets: [{ label: 'Fill Rate %', data: fr.map(f => f.fill_rate || 0), backgroundColor: 'rgba(99, 102, 241, 0.6)' }]
            },
            options: { responsive: true, scales: { y: { beginAtZero: true, max: 100 } } }
        });
    }

    // Revenue chart
    const rev = revenue?.data || {};
    const ts = rev.time_series || [];
    destroyChart('revenueChart');
    if (ts.length) {
        charts.revenueChart = new Chart(document.getElementById('revenueChart'), {
            type: 'line',
            data: {
                labels: ts.map(t => t.period),
                datasets: [{ label: 'Revenue ($)', data: ts.map(t => (t.total || 0) / 100), borderColor: 'rgb(34, 197, 94)', fill: false }]
            },
            options: { responsive: true }
        });
    }

    // Member chart
    const mem = members?.data || {};
    const growth = mem.growth || [];
    destroyChart('memberChart');
    if (growth.length) {
        charts.memberChart = new Chart(document.getElementById('memberChart'), {
            type: 'line',
            data: {
                labels: growth.map(g => g.period),
                datasets: [
                    { label: 'New Members', data: growth.map(g => g.new_count || 0), borderColor: 'rgb(99, 102, 241)', fill: false },
                    { label: 'Churned', data: growth.map(g => g.churn_count || 0), borderColor: 'rgb(239, 68, 68)', fill: false }
                ]
            },
            options: { responsive: true }
        });
    }

    // Ticket chart
    const tk = tickets?.data || {};
    destroyChart('ticketChart');
    charts.ticketChart = new Chart(document.getElementById('ticketChart'), {
        type: 'doughnut',
        data: {
            labels: ['Open', 'In Progress', 'Resolved', 'Closed'],
            datasets: [{ data: [tk.open_count || 0, tk.in_progress_count || 0, tk.resolved_count || 0, tk.closed_count || 0],
                backgroundColor: ['#f59e0b', '#3b82f6', '#22c55e', '#6b7280'] }]
        },
        options: { responsive: true }
    });
}

function destroyChart(id) { if (charts[id]) { charts[id].destroy(); delete charts[id]; } }

function statCard(label, value, color) {
    return `<div class="bg-white rounded-lg shadow p-5"><p class="text-sm font-medium text-gray-500">${label}</p><p class="mt-1 text-2xl font-semibold ${color || 'text-gray-900'}">${value}</p></div>`;
}

initDate();
loadKPI();
</script>
{{end}}
