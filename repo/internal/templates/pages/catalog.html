{{define "content"}}
<div>
    <h1 class="text-2xl font-bold text-gray-900 mb-6">Catalog</h1>
    <div class="mb-4 flex flex-wrap gap-3">
        <input type="text" id="catalog-search" placeholder="Search..." class="px-3 py-2 border rounded-md text-sm w-64" oninput="loadCatalog(1)">
        <select id="catalog-type" class="px-3 py-2 border rounded-md text-sm" onchange="loadCatalog(1)">
            <option value="">All Types</option>
            <option value="session">Sessions</option>
            <option value="product">Products</option>
        </select>
    </div>
    <div id="catalog-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
        <div class="skeleton h-48 rounded-lg"></div>
        <div class="skeleton h-48 rounded-lg"></div>
        <div class="skeleton h-48 rounded-lg"></div>
    </div>
    <div id="catalog-pagination"></div>
</div>
{{end}}

{{define "scripts"}}
<script>
async function loadCatalog(page) {
    const search = document.getElementById('catalog-search').value;
    const type = document.getElementById('catalog-type').value;
    let url = `/api/catalog?page=${page || 1}&page_size=12`;
    if (search) url += `&q=${encodeURIComponent(search)}`;
    if (type) url += `&type=${type}`;

    const res = await api(url);
    if (!res) return;
    const items = res.data?.items || [];
    const el = document.getElementById('catalog-list');

    if (!items.length) {
        el.innerHTML = '<div class="col-span-full text-center py-8 text-gray-500">No items found</div>';
        document.getElementById('catalog-pagination').innerHTML = '';
        return;
    }

    el.innerHTML = items.map(item => `
        <div class="bg-white rounded-lg shadow hover:shadow-md transition-shadow">
            <div class="p-5">
                <div class="flex items-center justify-between mb-2">
                    <span class="text-xs font-medium px-2 py-1 rounded ${item.type === 'session' ? 'bg-blue-100 text-blue-800' : 'bg-green-100 text-green-800'}">${item.type}</span>
                    ${item.price_cents ? `<span class="font-semibold text-gray-900">${formatCents(item.price_cents)}</span>` : ''}
                </div>
                <h3 class="text-lg font-medium text-gray-900 mb-1">${item.name || item.title}</h3>
                <p class="text-sm text-gray-500 mb-3 line-clamp-2">${item.description || ''}</p>
                ${item.type === 'session' ? `
                    <div class="text-xs text-gray-500 space-y-1">
                        <p>Starts: ${formatDateTime(item.start_time)}</p>
                        <p>Seats: ${item.available_seats != null ? item.available_seats + ' available' : 'N/A'}</p>
                    </div>
                    <a href="/sessions/${item.id}" class="mt-3 inline-block text-sm text-indigo-600 hover:text-indigo-800">View Details</a>
                ` : `
                    <div class="text-xs text-gray-500"><p>Stock: ${item.stock_quantity != null ? item.stock_quantity : 'N/A'}</p></div>
                    <a href="/products/${item.id}" class="mt-3 inline-block text-sm text-indigo-600 hover:text-indigo-800">View Details</a>
                `}
            </div>
        </div>
    `).join('');
    document.getElementById('catalog-pagination').innerHTML = renderPagination(res.data, 'loadCatalog');
}
loadCatalog(1);
</script>
{{end}}
