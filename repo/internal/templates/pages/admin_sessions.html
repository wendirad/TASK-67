{{define "content"}}
<div>
    <div class="flex justify-between items-center mb-6">
        <h1 class="text-2xl font-bold text-gray-900">Session Management</h1>
        <button onclick="showCreateSession()" class="px-4 py-2 bg-indigo-600 text-white rounded-md hover:bg-indigo-700 text-sm">Create Session</button>
    </div>
    <div id="create-session-form" class="hidden mb-6 bg-white rounded-lg shadow p-6">
        <h3 class="text-lg font-medium mb-4">Create Session</h3>
        <form id="session-form" class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div><label class="block text-sm font-medium text-gray-700">Title</label><input id="sess-title" class="mt-1 block w-full px-3 py-2 border rounded-md text-sm" required></div>
            <div><label class="block text-sm font-medium text-gray-700">Facility ID</label><input id="sess-facility" class="mt-1 block w-full px-3 py-2 border rounded-md text-sm" required></div>
            <div><label class="block text-sm font-medium text-gray-700">Start Time</label><input id="sess-start" type="datetime-local" class="mt-1 block w-full px-3 py-2 border rounded-md text-sm" required></div>
            <div><label class="block text-sm font-medium text-gray-700">End Time</label><input id="sess-end" type="datetime-local" class="mt-1 block w-full px-3 py-2 border rounded-md text-sm" required></div>
            <div><label class="block text-sm font-medium text-gray-700">Total Seats</label><input id="sess-seats" type="number" min="1" class="mt-1 block w-full px-3 py-2 border rounded-md text-sm" required></div>
            <div><label class="block text-sm font-medium text-gray-700">Description</label><input id="sess-desc" class="mt-1 block w-full px-3 py-2 border rounded-md text-sm"></div>
            <div class="md:col-span-2 flex justify-end space-x-2">
                <button type="button" onclick="document.getElementById('create-session-form').classList.add('hidden')" class="px-4 py-2 border rounded-md text-sm">Cancel</button>
                <button type="submit" id="create-session-btn" class="px-4 py-2 bg-indigo-600 text-white rounded-md text-sm">Create</button>
            </div>
        </form>
    </div>
    <div id="sessions-list"><div class="skeleton h-16 rounded mb-2"></div></div>
    <div id="sessions-pagination"></div>
</div>
{{end}}

{{define "scripts"}}
<script>
function showCreateSession() { document.getElementById('create-session-form').classList.remove('hidden'); }

document.getElementById('session-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const res = await apiSubmit('/api/admin/sessions', {
        title: document.getElementById('sess-title').value,
        facility_id: document.getElementById('sess-facility').value,
        start_time: new Date(document.getElementById('sess-start').value).toISOString(),
        end_time: new Date(document.getElementById('sess-end').value).toISOString(),
        total_seats: parseInt(document.getElementById('sess-seats').value),
        description: document.getElementById('sess-desc').value,
    }, document.getElementById('create-session-btn'), 'Create');
    if (res) { document.getElementById('create-session-form').classList.add('hidden'); document.getElementById('session-form').reset(); loadSessions(1); }
});

async function loadSessions(page) {
    const res = await api(`/api/sessions?page=${page || 1}&page_size=20`);
    if (!res) return;
    const items = res.data?.items || [];
    const el = document.getElementById('sessions-list');
    if (!items.length) { el.innerHTML = '<p class="text-gray-500">No sessions found.</p>'; return; }

    el.innerHTML = `<div class="bg-white shadow rounded-lg overflow-x-auto"><table class="min-w-full divide-y divide-gray-200">
        <thead class="bg-gray-50"><tr>
            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Title</th>
            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Facility</th>
            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Start</th>
            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Seats</th>
            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Status</th>
        </tr></thead>
        <tbody class="divide-y divide-gray-200">
            ${items.map(s => `<tr>
                <td class="px-4 py-3 text-sm">${s.title}</td>
                <td class="px-4 py-3 text-sm">${s.facility_name || '-'}</td>
                <td class="px-4 py-3 text-sm">${formatDateTime(s.start_time)}</td>
                <td class="px-4 py-3 text-sm">${s.available_seats != null ? s.available_seats + '/' + s.total_seats : s.total_seats}</td>
                <td class="px-4 py-3">${statusBadge(s.status)}</td>
            </tr>`).join('')}
        </tbody></table></div>`;
    document.getElementById('sessions-pagination').innerHTML = renderPagination(res.data, 'loadSessions');
}

loadSessions(1);
</script>
{{end}}
