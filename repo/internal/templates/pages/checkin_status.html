{{define "content"}}
<div>
    <h1 class="text-2xl font-bold text-gray-900 mb-6">Check-in Status</h1>
    <div id="checkin-content"><div class="skeleton h-32 rounded-lg"></div></div>
</div>
{{end}}

{{define "scripts"}}
<script>
async function loadCheckinStatus() {
    const el = document.getElementById('checkin-content');
    el.innerHTML = `
        <div class="bg-white rounded-lg shadow p-6">
            <p class="text-gray-500">Check-in status is managed by staff at the facility kiosk.</p>
            <p class="text-sm text-gray-400 mt-2">Your active check-in details will appear here during a session.</p>
            <div class="mt-4">
                <h3 class="font-medium mb-2">Waitlist Position</h3>
                <div id="waitlist-info" class="text-sm text-gray-600">Loading...</div>
            </div>
        </div>`;

    const res = await api('/api/waitlist/position');
    const wl = document.getElementById('waitlist-info');
    if (res?.data?.position) {
        wl.innerHTML = `You are #${res.data.position} in the waitlist for session "${res.data.session_title || 'N/A'}"`;
    } else {
        wl.innerHTML = 'You are not currently on any waitlist.';
    }
}
loadCheckinStatus();
</script>
{{end}}
